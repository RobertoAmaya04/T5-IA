<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer Contraseña — Hotel Penguin Paradise</title>
  <meta name="description" content="Crea una nueva contraseña para tu cuenta del Hotel Penguin Paradise." />
  <!-- Google Fonts para estilo Club Penguin -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="game-auth-body">
  <div class="page-wrapper">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-main">Hotel</span> <span class="brand-accent">Penguin</span>
        </div>
        <div class="brand-subtitle">Restablecimiento de contraseña</div>
      </div>

      <!-- Alert container -->
      <div id="alert-box"></div>

      <!-- Form section (shown if token is valid) -->
      <div id="form-section">
        <h1 class="card-title">Nueva Contraseña</h1>
        <p class="card-description">Elige una contraseña segura para tu cuenta</p>

        <form id="reset-form" novalidate>
          <input type="hidden" id="reset-token" />

          <div class="form-group">
            <label class="form-label" for="new-password">Nueva Contraseña</label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="new-password"
                name="new-password"
                placeholder="Mínimo 6 caracteres"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" id="toggle-new" aria-label="Mostrar/ocultar contraseña">
                👁
              </button>
            </div>
            <div class="strength-meter" id="strength-meter">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
              <div class="strength-bar" id="sb4"></div>
            </div>
            <div class="strength-label" id="strength-label">Ingresa una contraseña</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirmar Contraseña</label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="Repite tu contraseña"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" id="toggle-confirm" aria-label="Mostrar/ocultar contraseña">
                👁
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            Restablecer Contraseña
          </button>
        </form>
      </div>

      <!-- Success section (shown after reset) -->
      <div id="success-section" style="display:none; text-align:center;">
        <div class="state-icon success">✅</div>
        <h1 class="card-title">¡Contraseña Actualizada!</h1>
        <p class="card-description">Tu contraseña ha sido restablecida exitosamente.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:1rem;">
          Ir a Iniciar Sesión
        </a>
      </div>

      <div class="form-footer">
        <a href="index.html">← Volver al inicio de sesión</a>
      </div>

    </div>
  </div>

  <script src="js/reset.js"></script>
</body>
</html>
