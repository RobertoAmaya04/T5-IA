<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar Email — Hotel Penguin Paradise</title>
  <meta name="description" content="Verifica tu cuenta de Hotel Penguin Paradise con el link enviado a tu correo." />
  <!-- Google Fonts para estilo Club Penguin -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="game-auth-body">
  <div class="page-wrapper">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-main">Hotel</span> <span class="brand-accent">Penguin</span>
        </div>
      </div>

      <!-- Dynamic content injected by JS -->
      <div id="verify-content">
        <!-- Loading state -->
        <div class="state-icon pending">⏳</div>
        <h1 class="card-title">Verificando...</h1>
        <p class="card-description">Comprobando tu token de verificación</p>
      </div>

    </div>
  </div>

  <script src="js/verify.js"></script>
</body>
</html>
