<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Acceso — Hotel Club Penguin </title>
  <meta name="description" content="Recupera tu usuario o contraseña del Hotel Penguin Paradise." />
  <!-- Google Fonts para estilo Club Penguin -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="game-auth-body">
  <div class="page-wrapper">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-main">Hotel</span> <span class="brand-accent">Penguin</span>
        </div>
        <div class="brand-subtitle">Recuperación de acceso</div>
      </div>

      <h1 class="card-title">¿Qué olvidaste?</h1>
      <p class="card-description">Selecciona qué necesitas recuperar para tu pingüino</p>

      <!-- Alert container -->
      <div id="alert-box"></div>

      <!-- Form -->
      <form id="forgot-form" novalidate>

        <!-- Radio selection: user or password -->
        <div class="radio-group">
          <div class="radio-card">
            <input type="radio" id="opt-user" name="recovery-type" value="user" checked />
            <label for="opt-user">
              <span class="r-icon">👤</span>
              <span class="r-title">Mi Usuario</span>
              <span class="r-desc">Recuperar nombre</span>
            </label>
          </div>
          <div class="radio-card">
            <input type="radio" id="opt-password" name="recovery-type" value="password" />
            <label for="opt-password">
              <span class="r-icon">🔑</span>
              <span class="r-title">Mi Contraseña</span>
              <span class="r-desc">Link de reset</span>
            </label>
          </div>
        </div>

        <div class="divider">ingresa tu email</div>

        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico registrado</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="ejemplo@correo.com"
            autocomplete="email" required />
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Enviar Instrucciones
        </button>

      </form>

      <div class="form-footer">
        <a href="index.html">← Volver al inicio de sesión</a>
      </div>

    </div>
  </div>

  <script src="js/forgot.js"></script>
</body>

</html>
